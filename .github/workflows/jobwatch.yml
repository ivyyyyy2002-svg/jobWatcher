name: jobwatch

on:
  schedule:
    # ALERT mode — every 30 min at :07 and :37. Pushes only fresh, not-yet-seen jobs.
    # GitHub cron is UTC. Free-tier scheduled runs can be delayed a few minutes
    # at peak times; offset minutes avoid the busiest :00/:30 scheduler windows.
    - cron: "7,37 * * * *"
    # DIGEST mode — once daily. 04:00 UTC = 00:00 Eastern (London, ON) in summer.
    # In winter (EST, UTC-5) this lands at 23:00 the previous day; close enough.
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        type: choice
        options: [alert, digest]
        default: alert

permissions:
  contents: write

concurrency:
  group: jobwatch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      # Decide the mode:
      #  - the 04:00 UTC schedule -> digest
      #  - everything else (30-min schedule) -> alert
      #  - manual run -> whatever you picked in the dropdown
      - name: Determine mode
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "0 4 * * *" ]]; then
            echo "mode=digest" >> "$GITHUB_OUTPUT"
          else
            echo "mode=alert" >> "$GITHUB_OUTPUT"
          fi

      - name: Run jobwatch (${{ steps.mode.outputs.mode }})
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          JOBWATCH_DB: seen_jobs.db
          JOBWATCH_MODE: ${{ steps.mode.outputs.mode }}
        run: python jobwatch.py

      # Only alert mode changes the dedup DB. Digest never writes it, so this is
      # a no-op on digest runs.
      - name: Persist dedup database
        run: |
          if [[ -n "$(git status --porcelain seen_jobs.db)" ]]; then
            git config user.name "jobwatch-bot"
            git config user.email "jobwatch-bot@users.noreply.github.com"
            git add seen_jobs.db
            git commit -m "update seen jobs [skip ci]"
            git push
          else
            echo "No DB changes to commit."
          fi
